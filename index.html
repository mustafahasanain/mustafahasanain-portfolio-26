  <!-- ===================================================================
       INTERNAL STYLES
       Palette extracted from the logo: deep charcoal background,
       off-white primary, and mid-gray accents (a refined monochrome set).
  ==================================================================== -->
  <style>
    /* ---------- Design tokens (logo-derived color palette) ---------- */
    :root {
      --bg-deep:    #0c0c0e;  /* logo background — near black            */
      --bg-raised:  #141417;  /* slightly lifted surface                 */
      --ink:        #ececee;  /* logo light bars — primary text          */
      --ink-soft:   #a9a9ad;  /* secondary text                          */
      --ink-mute:   #6b6b70;  /* logo mid bars — muted text / lines      */
      --line:       rgba(236, 236, 238, 0.10);
      --accent:     #dcdcde;  /* logo highlight — accents / progress     */
      --glow:       rgba(220, 220, 222, 0.14);

      --radius:     22px;
      --max-width:  620px;
      --ease:       cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* ---------- Reset & base ---------- */
    *, *::before, *::after { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      margin: 0;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: clamp(20px, 5vw, 48px);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   Helvetica, Arial, "Apple Color Emoji", sans-serif;
      color: var(--ink);
      background: var(--bg-deep);
      /* Animated, very slow gradient wash for subtle depth */
      background-image:
        radial-gradient(1100px 700px at 18% -10%, #1b1b20 0%, transparent 60%),
        radial-gradient(900px 600px at 110% 120%, #18181c 0%, transparent 55%);
      background-attachment: fixed;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow: hidden;
    }

    /* ===================================================================
       FLOATING BACKGROUND SHAPES
       Lightweight, blurred orbs that drift slowly. Purely decorative,
       so they are hidden from assistive tech via aria-hidden in markup.
    ==================================================================== */
    .bg-shapes {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .shape {
      position: absolute;
      border-radius: 50%;
      filter: blur(46px);
      opacity: 0.5;
      will-change: transform;
    }
    .shape--1 {
      width: 320px; height: 320px;
      top: -80px; left: -60px;
      background: radial-gradient(circle at 30% 30%, #2a2a30, transparent 70%);
      animation: drift1 22s var(--ease) infinite alternate;
    }
    .shape--2 {
      width: 260px; height: 260px;
      bottom: -70px; right: -40px;
      background: radial-gradient(circle at 60% 40%, #232328, transparent 70%);
      animation: drift2 26s var(--ease) infinite alternate;
    }
    .shape--3 {
      width: 180px; height: 180px;
      top: 55%; left: 8%;
      background: radial-gradient(circle at 50% 50%, #1f1f24, transparent 70%);
      animation: drift3 30s var(--ease) infinite alternate;
    }
    @keyframes drift1 { to { transform: translate(60px, 40px) scale(1.12); } }
    @keyframes drift2 { to { transform: translate(-50px, -36px) scale(1.08); } }
    @keyframes drift3 { to { transform: translate(40px, -50px) scale(1.15); } }

    /* ===================================================================
       MAIN CARD
    ==================================================================== */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: var(--max-width);
      text-align: center;
      padding: clamp(32px, 6vw, 56px) clamp(24px, 5vw, 52px);
      background: linear-gradient(180deg, rgba(26,26,30,0.72), rgba(16,16,19,0.72));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow:
        0 1px 0 rgba(255,255,255,0.04) inset,
        0 30px 80px -30px rgba(0,0,0,0.8);
      animation: rise 0.9s var(--ease) both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ---------- Logo ---------- */
    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      width: clamp(84px, 18vw, 104px);
      height: clamp(84px, 18vw, 104px);
      margin: 0 auto clamp(22px, 4vw, 30px);
      border-radius: 20px;
      background: var(--bg-deep);
      border: 1px solid var(--line);
      box-shadow: 0 0 0 1px rgba(0,0,0,0.4), 0 14px 40px -16px rgba(0,0,0,0.9);
      /* Gentle breathing glow — the "progress pulse" cue */
      animation: pulseGlow 3.4s ease-in-out infinite;
    }
    .logo-wrap img {
      width: 78%;
      height: 78%;
      object-fit: contain;
      display: block;
    }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 0 0 var(--glow), 0 14px 40px -16px rgba(0,0,0,0.9); }
      50%      { box-shadow: 0 0 0 12px rgba(220,220,222,0), 0 14px 40px -16px rgba(0,0,0,0.9); }
    }

    /* ---------- Brand wordmark ---------- */
    .brand {
      margin: 0 0 clamp(18px, 4vw, 26px);
      font-size: clamp(15px, 2.4vw, 17px);
      font-weight: 600;
      letter-spacing: 0.01em;
      color: var(--ink);
    }

    /* ---------- Eyebrow / status pill ---------- */
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 18px;
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-soft);
      background: rgba(236,236,238,0.04);
      border: 1px solid var(--line);
      border-radius: 999px;
    }
    .eyebrow .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 0 var(--glow);
      animation: blink 1.8s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1;   box-shadow: 0 0 0 0 var(--glow); }
      50%      { opacity: 0.4; box-shadow: 0 0 0 6px rgba(220,220,222,0); }
    }

    /* ---------- Typography ---------- */
    h1 {
      margin: 0 0 14px;
      font-size: clamp(28px, 6.2vw, 44px);
      line-height: 1.1;
      letter-spacing: -0.02em;
      font-weight: 700;
      color: var(--ink);
    }
    .subtitle {
      margin: 0 auto;
      max-width: 46ch;
      font-size: clamp(15px, 2.4vw, 17px);
      line-height: 1.65;
      color: var(--ink-soft);
    }

    /* ---------- Indeterminate progress bar ---------- */
    .progress {
      position: relative;
      width: min(280px, 80%);
      height: 4px;
      margin: clamp(28px, 5vw, 36px) auto clamp(22px, 4vw, 28px);
      background: rgba(236,236,238,0.08);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress::after {
      content: "";
      position: absolute;
      inset: 0;
      width: 40%;
      border-radius: inherit;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: slide 3.4s var(--ease) infinite;
    }
    @keyframes slide {
      0%   { transform: translateX(-120%); }
      100% { transform: translateX(330%); }
    }

    /* ---------- Footer meta ---------- */
    .meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 8px 18px;
      margin-top: 4px;
      font-size: 13px;
      color: var(--ink-mute);
    }
    .meta a {
      color: var(--ink-soft);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }
    .meta a:hover,
    .meta a:focus-visible { color: var(--ink); border-bottom-color: var(--ink-mute); }
    .meta .sep { color: var(--line); }

    /* ---------- Social / contact links ---------- */
    .socials {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: clamp(22px, 4vw, 28px) 0 clamp(20px, 4vw, 26px);
    }
    .social {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 46px;
      height: 46px;
      border-radius: 14px;
      color: var(--ink-soft);
      background: rgba(236,236,238,0.04);
      border: 1px solid var(--line);
      transition: color 0.2s var(--ease),
                  background 0.2s var(--ease),
                  border-color 0.2s var(--ease),
                  transform 0.2s var(--ease);
    }
    .social svg { width: 20px; height: 20px; display: block; }
    .social:hover,
    .social:focus-visible {
      color: var(--bg-deep);
      background: var(--accent);
      border-color: var(--accent);
      transform: translateY(-3px);
    }

    /* ---------- Accessibility focus ring ---------- */
    a:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
      border-radius: 4px;
    }

    /* ===================================================================
       RESPONSIVE TWEAKS
    ==================================================================== */
    @media (max-width: 420px) {
      .meta { gap: 6px 12px; }
      .meta .sep { display: none; }
    }

    /* ---------- Respect reduced-motion preference ---------- */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
      }
      .progress::after { display: none; }
    }
  </style>
</head>
